<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF9EF"/>
      <stop offset="100%" stop-color="#FFE9C7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- confetti -->
  <g opacity="0.85">
    <rect x="120" y="90" width="22" height="22" rx="4" fill="#FF6B6B" transform="rotate(18 131 101)"/>
    <rect x="1040" y="80" width="20" height="20" rx="4" fill="#3DA9E0" transform="rotate(-22 1050 90)"/>
    <rect x="200" y="520" width="18" height="18" rx="4" fill="#5BC57A" transform="rotate(12 209 529)"/>
    <rect x="980" y="520" width="20" height="20" rx="4" fill="#9B6DD6" transform="rotate(-14 990 530)"/>
    <circle cx="1080" cy="300" r="10" fill="#FF8FB1"/>
    <circle cx="110" cy="320" r="9" fill="#FF9F43"/>
  </g>
  <!-- sun mark -->
  <g transform="translate(150 250)">
    <g stroke="#F4A500" stroke-width="7" stroke-linecap="round">
      <line x1="55" y1="-8" x2="55" y2="-26"/>
      <line x1="93" y1="17" x2="106" y2="4"/>
      <line x1="110" y1="55" x2="128" y2="55"/>
      <line x1="17" y1="17" x2="4" y2="4"/>
      <line x1="0" y1="55" x2="-18" y2="55"/>
      <line x1="93" y1="93" x2="106" y2="106"/>
      <line x1="17" y1="93" x2="4" y2="106"/>
    </g>
    <circle cx="55" cy="55" r="40" fill="#FFC93C"/>
    <circle cx="55" cy="55" r="40" fill="none" stroke="#9B1B1B" stroke-width="5"/>
    <circle cx="45" cy="50" r="5" fill="#7a4a00"/>
    <circle cx="68" cy="50" r="5" fill="#7a4a00"/>
    <path d="M44 64 Q 56 76 68 64" stroke="#7a4a00" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- wordmark -->
  <text x="340" y="270" font-family="Georgia, serif" font-size="74" font-weight="700" fill="#2D2433">Drona Valley</text>
  <text x="340" y="350" font-family="Georgia, serif" font-size="74" font-weight="700" fill="#9B1B1B">Public School</text>
  <text x="344" y="405" font-family="Arial, sans-serif" font-size="26" letter-spacing="3" fill="#6b6270">EARLY YEARS OF THE ELDEN HEIGHTS SCHOOL</text>
  <!-- tagline pill -->
  <g transform="translate(344 450)">
    <rect width="560" height="64" rx="32" fill="#9B1B1B"/>
    <text x="280" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#fff">Where Little Wonders Take Their First Big Steps</text>
  </g>
  <!-- hills -->
  <path d="M0 560 Q 300 510 600 555 T 1200 545 V630 H0 Z" fill="#7ED598"/>
  <path d="M0 590 Q 350 555 700 590 T 1200 585 V630 H0 Z" fill="#5BC57A"/>
